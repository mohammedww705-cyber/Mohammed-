name: filex
description: FileX - Professional File Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_vector_icons: ^2.0.0
  
  # File Management
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  open_file: ^3.3.2
  
  # Archive / ZIP
  archive: ^3.4.9
  
  # PDF
  flutter_pdfview: ^1.3.2
  
  # Images & Video
  photo_view: ^0.14.0
  video_player: ^2.8.2
  chewie: ^1.7.4
  cached_network_image: ^3.3.1
  
  # Storage & Cloud
  shared_preferences: ^2.2.2
  
  # Permissions
  permission_handler: ^11.1.0
  
  # UI Extras
  flutter_slidable: ^3.0.1
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  mime: ^1.0.5
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/animations/
