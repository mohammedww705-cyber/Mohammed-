name: filex
description: FileX - Professional File Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  open_file: ^3.3.2
  archive: ^3.4.9
  flutter_pdfview: ^1.3.2
  photo_view: ^0.14.0
  video_player: ^2.8.2
  chewie: ^1.7.4
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
